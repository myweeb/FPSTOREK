<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sua Loja</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Poppins', sans-serif;background:#1a0077f5;color:#000000}

nav{position:absolute;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:20px 20px;z-index:10}
.nav-links a{color:#ffffff;margin-left:20px;text-decoration:none;font-size:22px;opacity:.9}
.nav-links a:hover{opacity:1}

header{position:relative;height:400px;background:url('https://images.unsplash.com/photo-1521335629791-ce4aec67dd47') center/cover}

header::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.4);
}

.header-content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.header-content h1{font-size:32px;margin:0;position:relative;z-index:2;color:#fff}
.header-content p{opacity:.7;color:#fff;font-size:14px}

.logo-bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.1;
filter:none;
z-index:1;
}

.logo{font-weight:bold;font-size:24px;color:#fff}

section{padding:30px 20px}

.products{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}

.product{background:#000000;padding:15px;border-radius:10px}
.product img{width:100%;border-radius:10px}
.product h3{margin:10px 0;font-size:16px;color:#fff}

select,button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:5px;font-size:14px}
button{background:#25D366;color:#fff;font-weight:bold;cursor:pointer}

.about{max-width:700px;margin:auto;text-align:center}
.about h2{font-size:22px}
.about p{font-size:14px}

/* RESPONSIVO FORTE */
@media(max-width:600px){
.products{grid-template-columns:1fr}
.header-content h1{font-size:26px}
.nav-links a{font-size:20px}
}

</style>
</head>

<body>

<header>
<nav>
<div class="logo">FP</div>
<div class="nav-links">
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-tiktok"></i></a>
<a href="#"><i class="fab fa-whatsapp"></i></a>
</div>
</nav>

<img src="ChatGPT Image 12 de abr. de 2026, 09_31_00.png" class="logo-bg">

<script>
function comprar(nome, btn){
let product = btn.parentElement;
let size = product.querySelector('.size').value;
let variant = product.querySelector('.variant').value;

let mensagem = `Olá! Quero comprar:\nProduto: ${nome}\nTamanho: ${size}\nCor: ${variant}`;

let numero = '5599999999999';
let url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;

window.open(url, '_blank');
}
</script>

</body>
</html>
