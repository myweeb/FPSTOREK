<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbearia Estilo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary:#d4af37;
  --dark:#111;
  --gray:#222;
  --light:#f5f5f5;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:var(--dark);
  color:var(--light);
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  background:#000;
  padding:8px;
  text-align:center;
  border-bottom:1px solid var(--primary);
}

header h1{
  font-size:16px;
  color:var(--primary);
}

nav a{
  display:inline-block;
  margin-top:5px;
  font-size:12px;
  padding:6px 12px;
  border-radius:20px;
  background:var(--primary);
  color:#000;
  font-weight:bold;
}

/* HERO */
.hero{
  margin-top:60px;
  height:30vh;
  position:relative;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.hero-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.hero-text h2{
  font-size:18px;
  color:var(--primary);
}

.hero-text p{
  font-size:12px;
}

/* SEÇÕES */
section{
  padding:20px 10px;
  text-align:center;
}

h2{
  font-size:18px;
  color:var(--primary);
  margin-bottom:10px;
}

p{
  font-size:13px;
}

/* SERVIÇOS */
.cards{
  display:grid;
  gap:10px;
}

.card{
  background:var(--gray);
  padding:12px;
  border-radius:8px;
  border:1px solid var(--primary);
}

.card i{
  font-size:22px;
  color:var(--primary);
}

.card h3{
  font-size:14px;
  margin:5px 0;
}

.card p{
  font-size:12px;
}

/* GALERIA */
.galeria-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:5px;
}

.galeria-grid img{
  border-radius:5px;
}

/* FOOTER */
footer{
  padding:15px;
  background:#000;
  text-align:center;
}

footer a{
  margin:0 10px;
  font-size:20px;
}

/* DESKTOP */
@media(min-width:768px){
  .cards{
    grid-template-columns:repeat(3,1fr);
  }

  .galeria-grid{
    grid-template-columns:repeat(4,1fr);
  }

  .hero{
    height:50vh;
  }
}
</style>
</head>

<body>

<header>
  <h1>Barbearia Estilo</h1>
  <nav>
    <a href="tel:+553899999999">Agendar</a>
  </nav>
</header>

<div class="hero">
  <img src="barbearia.jpg">
  <div class="hero-text">
    <h2>Seu estilo começa aqui</h2>
    <p>Corte + barba profissional</p>
  </div>
</div>

<section>
  <h2>Sobre</h2>
  <p>Tradição + modernidade em cortes e barba.</p>
</section>

<section>
  <h2>Serviços</h2>
  <div class="cards">
    <div class="card">
      <i class="fas fa-cut"></i>
      <h3>Corte</h3>
      <p>Clássico ou moderno</p>
    </div>

    <div class="card">
      <i class="fas fa-beard"></i>
      <h3>Barba</h3>
      <p>Acabamento perfeito</p>
    </div>

    <div class="card">
      <i class="fas fa-spa"></i>
      <h3>Tratamento</h3>
      <p>Cuidados premium</p>
    </div>
  </div>
</section>

<section>
  <h2>Galeria</h2>
  <div class="galeria-grid">
    <img src="corte1.jpg">
    <img src="corte2.jpg">
    <img src="corte3.jpg">
    <img src="corte4.jpg">
  </div>
</section>

<footer>
  <a href="#"><i class="fab fa-whatsapp"></i></a>
  <a href="#"><i class="fab fa-instagram"></i></a>
  <a href="#"><i class="fab fa-tiktok"></i></a>
</footer>

</body>
</html>
