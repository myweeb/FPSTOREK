<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sua Loja</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#120052;color:#fff}

nav{position:absolute;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:15px 30px;z-index:10}
.nav-links a{color:#fff;margin-left:15px;text-decoration:none;font-size:18px;opacity:.8}
.nav-links a:hover{opacity:1}

header{position:relative;height:300px;background:url('https://images.unsplash.com/photo-1521335629791-ce4aec67dd47') center/cover}
header::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,0.6)}

.header-content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.header-content h1{font-size:40px;margin:0;position:relative;z-index:2}
.header-content p{opacity:.8}

header::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9));
}

.logo-bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.12;
filter: blur(2px) brightness(1.2);
z-index:1;
}

.logo{font-weight:bold;font-size:20px}

section{padding:40px}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.product{background:#1a1a1a;padding:15px;border-radius:10px}
.product img{width:100%;border-radius:10px}
.product h3{margin:10px 0}

select,button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:5px}
button{background:#25D366;color:#fff;font-weight:bold;cursor:pointer}

.about{max-width:700px;margin:auto;text-align:center}
</style>
</head>

<body>

<header>
<nav>
<div class="logo">FP</div>
<div class="nav-links">
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-tiktok"></i></a>
<a href="#"><i class="fab fa-whatsapp"></i></a>
</div>
</nav>

<!-- LOGO ATRÁS DO TÍTULO -->
<img src="ChatGPT Image 12 de abr. de 2026, 09_31_00.png" class="logo-bg">

<div class="header-content">
<h1>FP STORE</h1>
<p>Estilo e qualidade em um só lugar</p>
</div>
</header>

<section class="about">
<h2>Sobre Nós</h2>
<p>Somos uma loja focada em roupas exclusivas e de qualidade. Trabalhamos com peças selecionadas para destacar seu estilo.</p>
</section>

<section>
<h2 style="text-align:center">Produtos</h2>
<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Camiseta Street</h3>

<select class="size">
<option value="P">P</option>
<option value="M">M</option>
<option value="G">G</option>
</select>

<select class="variant">
<option value="Preta">Preta</option>
<option value="Branca">Branca</option>
</select>

<button onclick="comprar('Camiseta Street', this)">Comprar</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
<h3>Moletom Premium</h3>

<select class="size">
<option value="P">P</option>
<option value="M">M</option>
<option value="G">G</option>
</select>

<select class="variant">
<option value="Cinza">Cinza</option>
<option value="Preto">Preto</option>
</select>

<button onclick="comprar('Moletom Premium', this)">Comprar</button>
</div>

</div>
</section>

<script>
function comprar(nome, btn){
let product = btn.parentElement;
let size = product.querySelector('.size').value;
let variant = product.querySelector('.variant').value;

let mensagem = `Olá! Quero comprar:\nProduto: ${nome}\nTamanho: ${size}\nCor: ${variant}`;

let numero = '5599999999999';
let url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;

window.open(url, '_blank');
}
</script>

</body>
</html>
