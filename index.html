<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPSOTREK</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>


*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
overflow-x:hidden;
font-family:'Poppins', sans-serif;
background:#1a0077f5;
color:#000000;
}

/* NAV */
nav{
position:absolute;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
z-index:10;
}

.nav-links a{
color:#ffffff;
margin-left:20px;
text-decoration:none;
font-size:22px;
opacity:.9;
}

.nav-links a:hover{opacity:1}

/* HEADER */
header{
position:relative;
height:400px;
overflow:hidden;
background:url('https://images.unsplash.com/photo-1521335629791-ce4aec67dd47') center/cover;
}

header::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.4);
}

/* TEXTO CENTRAL */
.header-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
}

.header-content h1{
font-size:32px;
margin:0;
position:relative;
z-index:2;
color:#fff;
}

.header-content p{
opacity:.7;
color:#fff;
font-size:14px;
}

/* LOGO FUNDO */
.logo-bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.1;
z-index:1;
}

/* LOGO TEXTO */
.logo{
font-weight:bold;
font-size:24px;
color:#fff;
}

/* SECTIONS */
section{
padding:30px 20px;
}

/* PRODUTOS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.product{
background:#333333;
padding:15px;
border-radius:10px;
}

.product img{
width:100%;
border-radius:10px;
}

.product h3{
margin:10px 0;
font-size:16px;
color:#fff;
}

/* FORM */
select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:5px;
font-size:14px;
}

button{
background:#000000;
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* SOBRE */
.about{
max-width:700px;
margin:auto;
text-align:center;
}

.about h2{
font-size:22px;
}

.about p{
font-size:14px;
}

/* 📱 MOBILE */
@media(max-width:600px){
.products{
grid-template-columns:1fr;
}

.header-content h1{
font-size:26px;
}

.nav-links a{
font-size:20px;
}
}

</style>
</head>

<body>

<header>
<nav>
<div class="logo">FP</div>
<div class="nav-links">
<a href="https://www.instagram.com/fp_storek/"><i class="fa-brands fa-instagram"></i></a>
<a href="https://www.tiktok.com/@fp_storek"><i class="fa-brands fa-tiktok"></i></a>
<a href="#"><i class="fa-brands fa-whatsapp"></i></a>
</div>
</nav>

<img src="ChatGPT Image 12 de abr. de 2026, 09_31_00.png" class="logo-bg">

<div class="header-content">
<h1>FP STOREK</h1>
<p>Estilo e qualidade em um só lugar</p>
</div>
</header>

<section class="about">
<h2>Sobre Nós</h2>
<p>Somos uma loja focada em roupas exclusivas e de qualidade. Trabalhamos com peças selecionadas para destacar seu estilo.</p>
</section>

<section>
<h2 style="text-align:center;font-size:22px">Produtos</h2>
<div class="products">

<div class="product">
<img src="IMG_3084.jpeg">
<h3>SHORTS</h3>

<select class="size">
<option value="P">P</option>
<option value="M">M</option>
<option value="G">G</option>
</select>

<select class="variant">
<option value="Cinza">Cinza</option>
<option value="Preto">Preto</option>
</select>

<button onclick="comprar('Shorts', this)">Comprar</button>
</div>

<!-- REPETIDOS IGUAIS -->
<div class="product">
<img src="IMG_3083.jpeg">
<h3>POLO</h3>
<select class="size">
<option value="P">P</option>
<option value="M">M</option>
<option value="G">G</option>
</select>
<select class="variant">
<option value="Cinza">Cinza</option>
<option value="Preto">Preto</option>
</select>
<button onclick="comprar('Blusa polo', this)">Comprar</button>
</div>

<div class="product">
<img src="IMG_3082.jpeg">
<h3>ESTAMPADA</h3>
<select class="size">
<option value="P">P</option>
<option value="M">M</option>
<option value="G">G</option>
</select>
<select class="variant">
<option value="Cinza">Cinza</option>
<option value="Preto">Preto</option>
</select>
<button onclick="comprar('Blusa estampada', this)">Comprar</button>
</div>

<div class="product">
<img src="IMG_3081.jpeg">
<h3>BASICA</h3>
<select class="size">
<option value="P">P</option>
<option value="M">M</option>
<option value="G">G</option>
</select>
<select class="variant">
<option value="Cinza">Cinza</option>
<option value="Preto">Preto</option>
</select>
<button onclick="comprar('blusa basica', this)">Comprar</button>
</div>

</div>
</section>

<script>
function comprar(nome, btn){
let product = btn.parentElement;
let size = product.querySelector('.size').value;
let variant = product.querySelector('.variant').value;

let mensagem = `Iae! Quero comprar:\nProduto: ${nome}\nTamanho: ${size}\nCor: ${variant}`;

let numero = '5538991135197';
let url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;

window.open(url, '_blank');
}
</script>

</body>
</html>
